<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic RAG Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header class="chat-header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Agentic RAG</h1>
            </div>
            <p class="subtitle">AI Assistant powered by Local Knowledge</p>
        </header>

        <main class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <div class="message assistant-message initial-message">
                    <div class="avatar assistant-avatar">R</div>
                    <div class="message-content">
                        Hello! I am your Agentic RAG assistant. Ask me anything and I will use the local knowledge base to answer.
                    </div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <span></span><span></span><span></span>
            </div>
        </main>

        <footer class="input-area">
            <form id="chat-form">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
                    <button type="submit" id="send-button" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>
        </footer>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
