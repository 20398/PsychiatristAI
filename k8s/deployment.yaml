apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: my-app
        image: ghcr.io/20398/psychiatristai/app:latest
        ports:
        - containerPort: 80